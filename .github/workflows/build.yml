name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache node_modules keyed by lockfile — fast installs on unchanged deps
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      # Cache .astro/ keyed by content files — Astro skips re-processing
      # unchanged MDX/MD entries between builds (#22 incremental builds)
      - name: Cache Astro build artifacts
        uses: actions/cache@v4
        with:
          path: .astro
          key: astro-${{ hashFiles('src/content/**') }}
          restore-keys: astro-

      - name: Build
        run: npm run build

      # Upload dist/ as an artifact so deployment steps can consume it
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
